<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Set New Password — CoreHabit</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
background:#0b0f14;
color:white;
font-family:system-ui;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.card{
width:420px;
padding:40px;
background:#111827;
border-radius:20px;
box-shadow:0 30px 80px rgba(0,0,0,.6);
}

input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
margin-top:10px;
margin-bottom:20px;
background:#1f2937;
color:white;
}

button{
width:100%;
padding:14px;
border-radius:999px;
border:none;
background:linear-gradient(135deg,#7c5cff,#9b8cff);
color:white;
font-weight:700;
cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

<h2>Set a new password</h2>
<p style="color:#9ca3af;">Enter your new password below.</p>

<input id="password" type="password" placeholder="New password">

<button onclick="updatePassword()">Update Password</button>

<p id="msg"></p>

</div>

<script>

const { createClient } = supabase;

const supabaseClient = createClient(
"https://wonbwlvnojtgydvpllmk.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndvbmJ3bHZub2p0Z3lkdnBsbG1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NjExNjgsImV4cCI6MjA4NjIzNzE2OH0.AmWxx4I8t6MF2yo8FEv4CtMDlooASeg9Cy17fm_tslo"
);

async function updatePassword(){

const password = document.getElementById("password").value;

const { error } = await supabaseClient.auth.updateUser({
  password: password
});

if(error){
alert(error.message);
return;
}

document.getElementById("msg").textContent =
"Password updated. Redirecting to login...";

setTimeout(()=>{
window.location.href="/login.html";
},2000);

}

</script>

</body>
</html>
